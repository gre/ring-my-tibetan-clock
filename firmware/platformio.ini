; PlatformIO project for the Tibetan-clock ESP32-S3 firmware.
; Secrets (WIFI_SSID, MQTT_*) live in firmware/private_config.ini (gitignored).
; Copy private_config.ini.template -> private_config.ini and fill in before flashing
; with networking enabled. M0/M1 build cleanly even with empty build_flags.

[platformio]
extra_configs = private_config.ini

[env:esp32-c3-devkitm-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_echo = yes
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
build_flags =
    -DENABLE_NETWORKING=1
    ${private_config.build_flags}
